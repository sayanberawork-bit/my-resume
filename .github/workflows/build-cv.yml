name: Build CV PDF

on:
  push:
    paths:
      - 'cv.tex'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-extra texlive-latex-extra latexmk

      - name: Compile LaTeX to PDF
        run: latexmk -pdf -interaction=nonstopmode cv.tex

      - name: Rename output PDF
        run: mv cv.pdf Sayan_Bera_CV.pdf

      - name: Commit PDF to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Subam_Sarkar_Data_Engineer.pdf
          git diff --staged --quiet || git commit -m "📄 Auto-build: Updated CV PDF [skip ci]"
          git push

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Subam_Sarkar_Data_Engineer
          path: Subam_Sarkar_Data_Engineer.pdf
          retention-days: 90
